name: Build & Deploy to OVH

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t play-space-api:latest .
          mkdir -p docker-images
          docker save play-space-api:latest -o docker-images/play-space-api.tar
          ls -lh docker-images/play-space-api.tar
          file docker-images/play-space-api.tar

      - name: Ensure deploy folder exists
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          script: mkdir -p /tmp/deploy

      - name: Upload Docker image to OVH
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          source: "docker-images/play-space-api.tar"
          target: "/tmp/deploy/"
          rm: true

      - name: Deploy to OVH via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            echo "--- Starting deployment ---"

            DEPLOY_DIR="/tmp/deploy/docker-images"
            IMAGE_TAR="${DEPLOY_DIR}/play-space-api.tar"

            echo "Checking Docker image archive..."
            if [ ! -f "$IMAGE_TAR" ]; then
              echo "ERROR: $IMAGE_TAR not found. Aborting."
              exit 1
            fi

            echo "Loading Docker image..."
            docker load -i "$IMAGE_TAR" || (echo "Fallback load method..." && cat "$IMAGE_TAR" | docker load)

            echo "Cleaning up old container..."
            docker stop play-space-api 2>/dev/null || true
            docker rm play-space-api 2>/dev/null || true

            echo "Creating Docker network if it doesn't exist..."
            docker network create playspace-net 2>/dev/null || true

            echo "Starting new container..."
            docker run -d \
            --name play-space-api \
            --network playspace-net \
            -p 83:7125 \
            --add-host=host.docker.internal:host-gateway \
            -e "ConnectionStrings__DefaultConnection=${{ secrets.DATABASE_CONNECTION_STRING }}" \
            -e "TPayConfiguration__BaseUrl=https://openapi.sandbox.tpay.com" \
            -e "TPayConfiguration__MerchantId=${{ secrets.TPAY_MERCHANT_ID }}" \
            -e "TPayConfiguration__ApiKey=${{ secrets.TPAY_API_KEY }}" \
            -e "TPayConfiguration__ApiPassword=${{ secrets.TPAY_API_PASSWORD }}" \
            -e "TPayConfiguration__Md5Key=${{ secrets.TPAY_MD5_KEY }}" \
            -e "TPayConfiguration__NotificationUrl=https://api.playspace.agentreal.pl/api/payment/tpay-marketplace-notification" \
            -e "TPayConfiguration__ReturnUrl=https://api.playspace.agentreal.pl/payment/success" \
            -e "TPayConfiguration__IsSandbox=false" \
            --restart unless-stopped \
            play-space-api:latest
            
            docker network connect logging play-space-api


            echo "Verifying deployment..."
            docker ps --filter "name=play-space-api" --format "table {{.ID}}\t{{.Names}}\t{{.Status}}"

            echo "Cleaning up uploaded tar file..."
            rm -f "$IMAGE_TAR"

            echo "--- Deployment complete ---"
