name: Build & Deploy to OVH (UAT)

on:
  push:
    branches: [uat]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t play-space-api:uat .
          mkdir -p docker-images
          docker save play-space-api:uat -o docker-images/play-space-api-uat.tar
          ls -lh docker-images/play-space-api-uat.tar

      - name: Ensure deploy folder exists
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.OVH_HOST_UAT }}
          username: ${{ secrets.OVH_USER_UAT }}
          key: ${{ secrets.OVH_SSH_KEY_UAT }}
          script: mkdir -p /tmp/deploy

      - name: Upload Docker image to OVH (UAT)
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.OVH_HOST_UAT }}
          username: ${{ secrets.OVH_USER_UAT }}
          key: ${{ secrets.OVH_SSH_KEY_UAT }}
          source: "docker-images/play-space-api-uat.tar"
          target: "/tmp/deploy/"
          rm: true

      - name: Deploy to OVH (UAT)
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.OVH_HOST_UAT }}
          username: ${{ secrets.OVH_USER_UAT }}
          key: ${{ secrets.OVH_SSH_KEY_UAT }}
          script: |
            echo "--- Starting UAT deployment ---"

            DEPLOY_DIR="/tmp/deploy/docker-images"
            IMAGE_TAR="${DEPLOY_DIR}/play-space-api-uat.tar"

            if [ ! -f "$IMAGE_TAR" ]; then
              echo "ERROR: Docker image not found."
              exit 1
            fi

            echo "Loading Docker image..."
            docker load -i "$IMAGE_TAR" || (cat "$IMAGE_TAR" | docker load)

            echo "Stopping old container..."
            docker stop play-space-api-uat 2>/dev/null || true
            docker rm play-space-api-uat 2>/dev/null || true

            echo "Creating Docker network if needed..."
            # Ensure network exists but DO NOT recreate it
            docker network inspect playspace-net >/dev/null 2>&1 || \
            docker network create --subnet=172.20.0.0/16 playspace-net

            echo "Starting new UAT container..."
            docker run -d \
              --name play-space-api-uat \
              --network playspace-net \
              -p 84:7125 \
              --add-host=host.docker.internal:host-gateway \
              -e "ASPNETCORE_ENVIRONMENT=UAT" \
              -e "ASPNETCORE_URLS=http://+:7125" \
              -e "ConnectionStrings__DefaultConnection=${{ secrets.DATABASE_CONNECTION_STRING_UAT }}" \
              -e "TPayConfiguration__BaseUrl=https://openapi.sandbox.tpay.com" \
              -e "TPayConfiguration__MerchantId=${{ secrets.TPAY_MERCHANT_ID_UAT }}" \
              -e "TPayConfiguration__ApiKey=${{ secrets.TPAY_API_KEY_UAT }}" \
              -e "TPayConfiguration__ApiPassword=${{ secrets.TPAY_API_PASSWORD_UAT }}" \
              -e "TPayConfiguration__Md5Key=${{ secrets.TPAY_MD5_KEY_UAT }}" \
              -e "TPayConfiguration__NotificationUrl=https://uat.api.spotto.pl/api/payment/tpay-marketplace-notification" \
              -e "TPayConfiguration__ReturnUrl=https://uat.api.spotto.pl/payment/success" \
              -e "TPayConfiguration__IsSandbox=true" \
              --restart unless-stopped \
              play-space-api:uat

            docker network connect logging play-space-api-uat 2>/dev/null || true

            echo "Verifying deployment..."
            docker ps --filter "name=play-space-api-uat" --format "table {{.ID}}\t{{.Names}}\t{{.Status}}"

            echo "Cleaning up..."
            rm -f "$IMAGE_TAR"

            echo "--- UAT Deployment Complete ---"
